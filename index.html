<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Now</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background-color: #22c55e;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #16a34a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Make a Difference</h1>
    <button class="btn" onclick="volunteer()">Volunteer Now</button>
  </div>

  <script>
    function volunteer() {
      alert("Thank you for your interest! We'll connect you with opportunities soon.");
    }
  </script>
</body>
</html>
